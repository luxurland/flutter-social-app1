name: Deploy Cloudflare Worker

on:
  push:
    branches: [ "main" ]
    paths:
      - "worker/**"

jobs:
  deploy:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          cd worker
          npm install

      - name: Debug Secrets (safe check)
        run: |
          if [ -z "${{ secrets.JWT_SECRET }}" ]; then
            echo "⚠️ Warning: JWT_SECRET is not set in GitHub Secrets"
          else
            echo "✅ JWT_SECRET is set in GitHub Secrets"
          fi
          
          if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]; then
            echo "❌ Error: CLOUDFLARE_API_TOKEN is not set in GitHub Secrets"
            exit 1
          else
            echo "✅ CLOUDFLARE_API_TOKEN is set in GitHub Secrets"
          fi

      - name: Deploy Worker to Cloudflare (first time)
        run: |
          cd worker
          
          # First deploy the Worker (creates it if it doesn't exist)
          echo "🚀 Deploying Worker..."
          npx wrangler deploy
          
          # Then add the secret (only if JWT_SECRET exists)
          if [ ! -z "${{ secrets.JWT_SECRET }}" ]; then
            echo "🔐 Adding JWT_SECRET to Worker..."
            echo "${{ secrets.JWT_SECRET }}" | npx wrangler secret put JWT_SECRET || true
          else
            echo "⚠️ Skipping JWT_SECRET - not available"
          fi
          
          # Redeploy to ensure secret is active
          echo "🚀 Redeploying with secret..."
          npx wrangler deploy
          
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
